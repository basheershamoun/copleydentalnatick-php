
<div id="form-container-service-contact" data-redirect-to="/services/thank-you-contact-us/">
    <span id="status-service-contact" class="hidden"></span>
    <form id="form-service-contact" class="contact-form" data-form-name="Service Contact Form" method="post" action="">
        <h2 style="text-align:center;font-size:25px;">REQUEST A CONSULTATION</h2>
        <div style="color:white;margin-top:10px;margin-left: 4%;text-align:left;"><font style="color:red;">(*)</font> Required fields</div>
        <div>
            <input id="name" type="text" name="firstName" class="form-input" placeholder="First Name(*)" required/>
        </div>
        <div>
            <input id="app" type="text" name="lastName" class="form-input" placeholder="Last Name(*)" required/>
        </div>
        <div>
            <input id="mail" type="email" name="email" class="form-input" placeholder="Email(*)" required/>
        </div>
        <div>
            <input id="phone" type="tel" name="phone" class="form-input" placeholder="Phone(*)" required/>
        </div>
        <div>
            <textarea id="message" rows="10" name="message" class="form-input" placeholder="Message" style="font-family:Tahoma,Geneva,sans-serif;font-size:14px;" maxlength="500" required></textarea>
        </div>
        <div class="form-section">
            <div class="form-section-fields">
                <br>
                <div class="section-submit">
                    <input type="submit" value="Send" style="cursor:pointer;width:25%;"/>
                </div>
            </div>
        </div>
    </form>
</div>
